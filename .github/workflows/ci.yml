name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install spex
        run: npm install -g @hekonsek/spex

      - name: Spex validate
        run: spex validate export
